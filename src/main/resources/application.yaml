spring:
  application:
    name: jianan-passager-creater
# springdoc-openapi 配置
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.jianan.jiananpassagercreater.controller
# knife4j 接口文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn
server:
  port: 8123
  servlet:
    context-path: /api
