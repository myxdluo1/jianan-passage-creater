spring:
  application:
    name: jianan-passager-creater
  # MySQL 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_passage_creator
    username: root
    password: root
  # session 配置
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:your-api-key-here}  # 通义千问 API Key
  profiles:
    active: local
# springdoc-openapi 配置
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.jianan.jiananpassagercreater.controller
# knife4j 接口文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn
server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000

mybatis-flex:
  configuration:
    map-underscore-to-camel-case: false

# 对象存储配置（需要从腾讯云获取）
cos:
  client:
    host:
    secretId:
    secretKey:
    region:
    bucket:
